<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline | Smart Crop Doctor</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        text-align: center;
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 24px;
        max-width: 420px;
      }
      h1 {
        margin: 0 0 10px;
        color: #34d399;
      }
      p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You are offline</h1>
      <p>Smart Crop Doctor is unavailable right now. Please reconnect and try again.</p>
    </div>
  </body>
</html>
